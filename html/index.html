<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Denúncia Urbana</title>
   <link rel="stylesheet" href="../css/login-cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="form-box">
        <div class="logo-box">
            <img src="img/logo.png" alt="Logo">
            <span>Denúncia Urbana</span>
        </div>

        <h2>Bem-vindo</h2>
        <p class="subtitle">Faça login para continuar</p>

        <form action="../html/inicio.html">
            <input type="email" name="email" placeholder="Seu e-mail" required>
            <input type="password" name="senha" placeholder="Sua senha" required>
            <button type="submit" class="btn">
                <i class="fa fa-arrow-right-to-bracket" style="margin-right:8px"></i>
                Entrar
            </button>
        </form>

        <p class="links">
            Não tem conta? <a href="../html/cadastro.html">Criar conta</a>
        </p>
    </div>
</body>
</html>
